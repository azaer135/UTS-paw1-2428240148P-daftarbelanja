<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
</head>
<body>
     <div class="container">

        <h2 class="text-center bg-primary text-white p-3 rounded mt-3">Daftar Belanja</h2>
        Barang
        <input type="text" id="Barang" class="form-control border-primary mb-3"/>
        Jumlah
        <input type="text" id="Jumlah" class="form-control border-primary mb-3"/>
        Image
        <input type="text" id="image" class="form-control border-primary mb-3"/>
        <button class="btn btn-primary" onclick="simpan()" >Simpan</button>

        <div class="row" id="list-mhs"></div>
    </div>
    <script>
        function simpan(){
            let barang = document.getElementById('Barang').value;
            let jumlah = document.getElementById('Jumlah').value;
            let image = document.getElementById('image').value;

            let data = {
                barang: barang,
                jumlah: jumlah,
                image: image
            }

            let listBelanja = JSON.parse(localStorage.getItem('listBelanja')) || [];
            listBelanja.push(data);
            localStorage.setItem('listBelanja', JSON.stringify(listBelanja));
            tampilkanData();
        }

        function tampilkanData(){
            let listBelanja = JSON.parse(localStorage.getItem('listBelanja')) || [];
            let html = '';
            listBelanja.forEach((item, index) => {
                html += `
                    <div class="col-md-4 mb-3">
                        <div class="card">
                            <img src="${item.image}" class="card-img-top" alt="${item.barang}">
                            <div class="card-body">
                                <h5 class="card-title">${item.barang}</h5>
                                <p class="card-text">Jumlah: ${item.jumlah}</p>
                            </div>
                        </div>
                    </div>
                `;
            });
            document.getElementById('list-mhs').innerHTML = html;
        }

        // Tampilkan data saat halaman dimuat
        tampilkanData();
    </script>
<img src="image1.jpg" class="rounded float-start" alt="...">
<img src="image2.jpg" class="rounded float-end" alt="...">
</body>
</html>
